<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebSocket chat</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>WebSocket чат</h1>
      <div id="connection-form">
        <h2>Подключение к серверу</h2>
        <form id="connect-form">
          <div class="form-group">
            <label for="host">Адрес сервера:</label>
            <input type="text" id="host" placeholder="localhost" required />
          </div>
          <div class="form-group">
            <label for="port">Порт:</label>
            <input type="number" id="port" placeholder="8765" required />
          </div>
          <div class="form-group">
            <label for="username">Ваше имя:</label>
            <input type="text" id="username" placeholder="anonymous" required />
          </div>
          <button type="submit">Подключиться</button>
        </form>
      </div>
      <div id="chat-container" style="display: none">
        <div class="chat-header">
          <h2 id="chat-title">Чат</h2>
          <button id="disconnect-btn">Отключиться</button>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
          <input
            type="text"
            id="message-input"
            placeholder="Введите сообщение..."
            autocomplete="off"
          />
          <button id="send-btn">Отправить</button>
        </div>
      </div>
    </div>
    <script src="js/main.js"></script>
  </body>
</html>
